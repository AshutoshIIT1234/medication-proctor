version: "3.9"

services:
  medication-proctor:
    build:
      context: .
      dockerfile: Dockerfile
    image: medication-proctor:latest
    container_name: medication-proctor
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - .env
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')" ]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
